name: Publish SolixBar 0.5.0

on:
  push:
    tags:
      - release-v0.5.0

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare bilingual release notes
        run: |
          cp RELEASE_NOTES_0.5.0.md "$RUNNER_TEMP/release-notes.md"
          printf '\nSHA-256: `%s`\n' "$(sha256sum release-assets/SolixBar-0.5.0-macOS-arm64.zip | cut -d ' ' -f 1)" >> "$RUNNER_TEMP/release-notes.md"

      - name: Publish release and asset
        run: |
          if gh release view v0.5.0 >/dev/null 2>&1; then
            gh release edit v0.5.0 \
              --title "SolixBar 0.5.0" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --draft=false \
              --prerelease=false \
              --latest
          else
            gh release create v0.5.0 \
              --title "SolixBar 0.5.0" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --latest
          fi

          gh release upload v0.5.0 \
            release-assets/SolixBar-0.5.0-macOS-arm64.zip \
            --clobber
